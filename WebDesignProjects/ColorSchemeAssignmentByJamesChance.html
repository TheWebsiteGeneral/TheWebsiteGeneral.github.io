<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>ColorSchemeAssignment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="James Chance">
    <meta name="keywords" content="Color, Table, Scheme, hex, rgb, hsl, Roadrunner">
</head>
<body>
    <style>table, th, td {border: 1px solid black;}</style>
    <img src="https://littlewildstreak.com/wp-content/uploads/2023/07/roadrunner-2014-b.jpg" alt="Picture of a real Roadrunner bird that has aspects of black, white, brown, and a bit of blue." height="500"/>
    <table>
        <tr>
            <th colspan="5" style="font-family: Arial, Helvetica, sans-serif; font-weight: bold;">Roadrunner Bird</th>
        </tr>
        <tr>
            <td></td>
            <td style="background-color: #CCD6CB;">Sea Salt</td>
            <td style="background-color: #191D1C; color: #FFFFFF;">Piano Black</td>
            <td style="background-color: #9B773B;">Dirty Copper</td>
            <td style="background-color: #5A7F87;">Azure Blue</td>
        </tr>
        <tr>
            <td>hex</td>
            <td>#CCD6CB</td>
            <td>#191D1C</td>
            <td>#9B773B</td>
            <td>#5A7F87</td>
        </tr>
        <tr>
            <td>rgb</td>
            <td>rgb(204,214,203)</td>
            <td>rgb(25,29,28)</td>
            <td>rgb(155,119,59)</td>
            <td>rgb(90,127,135)</td>
        </tr>
        <tr>
            <td>hsl</td>
            <td>hsl(115,12%,82%)</td>
            <td>hsl(165,7%,11%)</td>
            <td>hsl(38,45%,42%)</td>
            <td>hsl(191,20%,44%)</td>
        </tr>
    </table>
</body>
</html>
