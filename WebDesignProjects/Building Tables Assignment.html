<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Building Tables Assignment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="James Chance">
    <meta name="keywords" content="Tables, Information, Table, Arizona, Maricopa, Phoenix, Glendale, Population, Individuals">
</head>
<body>
<style>
table, tr, td, th {border: 1px solid black;}
</style>
    <h1></h1>
        <table>
            <caption>Amount of Men & Women in Arizona 2018</caption>
            <thead>
                <tr>
                    <th colspan="3">Maricopa County</th>
                </tr>
                <tr>
                    <th></th>
                    <th>Men</th>
                    <th>Women</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th>Phoenix</th>
                    <td>25,310</td>
                    <td>18,953</td>
                </tr>
                <tr>
                    <th>Glendale</th>
                    <td>14,057</td>
                    <td>19,284</td>
                </tr>
            </tbody>
        </table>
    <h4>Conclusions</h4>
        <ul>
            <li>Phoenix has more total individuals</li>
            <li>Phoenix has more male individuals</li>
            <li>Glendale has more female individuals</li>
        </ul>
</body>
</html>
