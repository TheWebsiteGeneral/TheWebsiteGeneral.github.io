<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>StylishScheduleAssignment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="James Chance">
    <meta name="keywords" content="Stylish, Schedule, Day, Event, Events, Time">
</head>
<body>
    <style>
        table, td, tr, th {border: 2px solid black;}
        td, th {padding: 15px;}
        table {border-collapse: collapse; margin:auto; width: 500px; font-family: Arial, Helvetica, sans-serif;}
        caption {font-weight: bold; font-size: 24px; margin: 8px;}
        tr.dataNames {background-color: #8BC4FD; font-size: 18px;}
        .col1 {background-color: #B9DBFE; width: 150px;}
        td {padding-left: 20px; font-size: 16px;}
        .timeCol {text-align: center;}
    </style>
    <table>
        <colgroup>
            <col class="col1">
            <col>
        </colgroup>
        <caption>Day Schedule</caption>
        <tr class="dataNames">
            <th>Time</th>
            <th>Events</th>
        </tr>
        <tr>
            <td class="timeCol">8&colon;00 am</td>
            <td>Breakfast</td>
        </tr>
        <tr>
            <td class="timeCol">9&colon;00 am</td>
            <td>School</td>
        </tr>
        <tr>
            <td class="timeCol">12&colon;00 pm</td>
            <td>Lunch</td>
        </tr>
        <tr>
            <td class="timeCol">1&colon;00 pm</td>
            <td>More School</td>
        </tr>
        <tr>
            <td class="timeCol">4&colon;00 pm</td>
            <td>Workout&sol;Exercise</td>
        </tr>
        <tr>
            <td class="timeCol">6&colon;00 pm</td>
            <td>Dinner</td>
        </tr>
        <tr>
            <td class="timeCol">7&colon;00 pm</td>
            <td>Entertainment such as Games or Movies</td>
        </tr>
        <tr>
            <td class="timeCol">10&colon;00 pm</td>
            <td>Bedtime Routine &amp; Sleep</td>
        </tr>
    </table>
</body>
</html>
